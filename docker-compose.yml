services:
  probemap:
    build: .
    ports:
      - "${PROBEMAP_HOST_PORT:-8000}:8000"
    volumes:
      - probemap_data:/app/data
    environment:
      PROBEMAP_DATASOURCE_URL: ${PROBEMAP_DATASOURCE_URL:-}
      PROBEMAP_CORS_ORIGINS: ${PROBEMAP_CORS_ORIGINS:-*}
      PROBEMAP_LOG_LEVEL: ${PROBEMAP_LOG_LEVEL:-info}
      PROBEMAP_ADMIN_PASSWORD: ${PROBEMAP_ADMIN_PASSWORD:-}
      PROBEMAP_S3_ENDPOINT: ${PROBEMAP_S3_ENDPOINT:-}
      PROBEMAP_S3_BUCKET: ${PROBEMAP_S3_BUCKET:-}
      PROBEMAP_S3_ACCESS_KEY: ${PROBEMAP_S3_ACCESS_KEY:-}
      PROBEMAP_S3_SECRET_KEY: ${PROBEMAP_S3_SECRET_KEY:-}
      PROBEMAP_S3_REGION: ${PROBEMAP_S3_REGION:-us-east-1}
      PROBEMAP_S3_PREFIX: ${PROBEMAP_S3_PREFIX:-}
      # В образе порт приложения 8000 (см. Dockerfile); снаружи — PROBEMAP_HOST_PORT
    restart: unless-stopped

volumes:
  probemap_data:
