repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(backend|tests)/
      - id: ruff-format
        files: ^(backend|tests)/

  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        pass_filenames: false
        files: ^frontend/src/
